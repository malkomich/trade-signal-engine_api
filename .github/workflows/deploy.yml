name: Deploy API

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    concurrency:
      group: deploy-api
      cancel-in-progress: false
    runs-on: [self-hosted, raspberry, trade-signal-engine-api]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Verify runner prerequisites
        run: |
          set -e
          docker --version
          docker compose version

      - name: Prepare credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_TRADE_SIGNAL_ENGINE: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TRADE_SIGNAL_ENGINE }}
        run: |
          set -e
          install_dir="$HOME/.trade-signal-engine-api"
          mkdir -p "$install_dir"
          credentials_file="$install_dir/firebase-service-account.json"
          credentials_json="$FIREBASE_SERVICE_ACCOUNT_TRADE_SIGNAL_ENGINE"
          if [ -z "$credentials_json" ]; then
            echo "no Firebase credentials secret was provided" >&2
            exit 1
          fi
          printf '%s' "$credentials_json" > "$credentials_file"
          chmod 600 "$credentials_file"
          echo "FIREBASE_CREDENTIALS_FILE=$credentials_file" >> "$GITHUB_ENV"

      - name: Remove legacy containers
        run: |
          set -e
          for container in \
            trade-signal-engine-server-api \
            trade-signal-engine-server-api-1 \
            trading-signal-engine-server-api \
            trading-signal-engine-server-api-1
          do
            docker rm -f "$container" 2>/dev/null || true
          done

      - name: Deploy on Raspberry Pi
        env:
          FIREBASE_PROJECT_ID: trade-signal-engine
          FIREBASE_DATABASE_URL: https://trade-signal-engine-default-rtdb.firebaseio.com/
          ENVIRONMENT: production
          STORE_BACKEND: rtdb
          NOTIFICATION_BACKEND: fcm
          FCM_TOPIC: trade-signal-engine
          API_PORT: 18080
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          PUSHOVER_SOUND: ${{ vars.PUSHOVER_SOUND }}
          ALPACA_LIVE_API_KEY: ${{ secrets.ALPACA_LIVE_API_KEY }}
          ALPACA_LIVE_SECRET: ${{ secrets.ALPACA_LIVE_SECRET }}
          ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
          ALPACA_PAPER_SECRET: ${{ secrets.ALPACA_PAPER_SECRET }}
          ALPACA_PAPER_TRADING_URL: https://paper-api.alpaca.markets
          ALPACA_LIVE_TRADING_URL: https://api.alpaca.markets
          CORS_ALLOWED_ORIGINS: https://trade-signal-engine.web.app,https://trade-signal-engine.firebaseapp.com,https://*--trade-signal-engine.web.app,https://*--trade-signal-engine.firebaseapp.com,http://localhost:*,http://127.0.0.1:*
        run: |
          set -e
          docker compose up -d --build
          python - <<'PY'
          import os
          import sys
          import time
          from urllib.request import urlopen

          port = os.getenv("API_PORT", "18080")
          url = f"http://127.0.0.1:{port}/"
          deadline = time.time() + 60

          while time.time() < deadline:
              try:
                  with urlopen(url, timeout=2) as response:
                      if response.status == 200:
                          sys.exit(0)
              except Exception:
                  time.sleep(2)

          print("api landing page did not become ready", file=sys.stderr)
          sys.exit(1)
          PY
          docker compose ps
