name: Deploy API

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    concurrency:
      group: deploy-api
      cancel-in-progress: false
    runs-on: [self-hosted, raspberry, trade-signal-engine-api]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Prepare credentials
        run: |
          set -e
          install_dir="$(mktemp -d)"
          credentials_file="$install_dir/firebase-service-account.json"
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TRADE_SIGNAL_ENGINE }}' > "$credentials_file"
          echo "FIREBASE_CREDENTIALS_FILE=$credentials_file" >> "$GITHUB_ENV"

      - name: Deploy on Raspberry Pi
        working-directory: services/api
        env:
          FIREBASE_PROJECT_ID: trade-signal-engine
          ENVIRONMENT: production
          STORE_BACKEND: firestore
          NOTIFICATION_BACKEND: collapse
          API_PORT: 18080
        run: |
          set -e
          docker compose up -d --build --remove-orphans
          docker compose ps
