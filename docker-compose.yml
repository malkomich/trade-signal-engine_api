name: trade-signal-engine-server

services:
  api:
    container_name: trade-signal-engine-server-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-18080}:8080"
    environment:
      HTTP_ADDR: :8080
      ENVIRONMENT: ${ENVIRONMENT:-production}
      STORE_BACKEND: ${STORE_BACKEND:-rtdb}
      NOTIFICATION_BACKEND: ${NOTIFICATION_BACKEND:-fcm}
      FCM_TOPIC: ${FCM_TOPIC:-trade-signal-engine}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:?FIREBASE_PROJECT_ID is required}
      FIREBASE_DATABASE_URL: ${FIREBASE_DATABASE_URL:-}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase-service-account.json
      PUSHOVER_USER_KEY: ${PUSHOVER_USER_KEY:-}
      PUSHOVER_API_TOKEN: ${PUSHOVER_API_TOKEN:-}
      PUSHOVER_SOUND: ${PUSHOVER_SOUND:-}
      ALPACA_API_KEY_ID: ${ALPACA_API_KEY_ID:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      ALPACA_PAPER_TRADING_URL: ${ALPACA_PAPER_TRADING_URL:-https://paper-api.alpaca.markets}
      ALPACA_LIVE_TRADING_URL: ${ALPACA_LIVE_TRADING_URL:-https://api.alpaca.markets}
    volumes:
      - ${FIREBASE_CREDENTIALS_FILE:?FIREBASE_CREDENTIALS_FILE is required}:/run/secrets/firebase-service-account.json:ro
